name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check:storybook-first
        env:
          STORYBOOK_BASE_REF: origin/${{ github.base_ref || 'main' }}
      - run: npm run lint
      - run: npm exec -- tsc --noEmit
      - run: npm run test:unit
      - run: npm run build-storybook
      - run: npx playwright install --with-deps chromium
      - run: npm run test-storybook
      - run: npm run build
