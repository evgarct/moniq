name: Migration Preview

on:
  pull_request:
    paths:
      - "supabase/**"
      - "scripts/seed-staging.mjs"
      - "scripts/verify-db.mjs"
      - ".github/workflows/migration-preview.yml"

concurrency:
  group: supabase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  migrate-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PRODUCTION_PROJECT_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
      MONIQ_STAGING_PASSWORD: ${{ secrets.MONIQ_STAGING_PASSWORD }}
      MONIQ_STAGING_EMAIL_DOMAIN: ${{ vars.MONIQ_STAGING_EMAIL_DOMAIN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: npm ci
      - name: Rebuild migrations from zero twice
        shell: bash
        run: |
          supabase start
          supabase db reset
          supabase db reset
      - name: Create isolated preview branch
        id: branch
        shell: bash
        run: |
          name="pr-${{ github.event.pull_request.number }}"
          supabase --experimental branches create "$name" --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --region eu-west-1 --size nano --yes
          supabase --experimental branches get "$name" --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" -o env >> "$GITHUB_ENV"
          echo "name=$name" >> "$GITHUB_OUTPUT"
      - name: Apply and verify migrations
        shell: bash
        run: |
          supabase db push --db-url "$POSTGRES_URL_NON_POOLING" --include-all --yes
          STAGING_SUPABASE_URL="$API_URL" \
          STAGING_SUPABASE_ANON_KEY="$ANON_KEY" \
          STAGING_SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" \
          SUPABASE_STAGING_PROJECT_REF="$BRANCH_PROJECT_ID" \
          npm run db:staging:seed
          STAGING_SUPABASE_URL="$API_URL" \
          STAGING_SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" \
          SUPABASE_STAGING_PROJECT_REF="$BRANCH_PROJECT_ID" \
          npm run db:verify
          psql "$POSTGRES_URL_NON_POOLING" -f scripts/verify-database.sql
          supabase db push --db-url "$POSTGRES_URL_NON_POOLING" --include-all --dry-run
      - name: Delete preview branch
        if: always() && steps.branch.outputs.name
        run: supabase --experimental branches delete "${{ steps.branch.outputs.name }}" --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --yes
